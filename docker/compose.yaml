services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ${APP_NAME}_nginx
    depends_on:
      php:
        condition: service_started
    ports:
      - "${APP_HTTP_PORT}:80"
    volumes:
      - ${APP_HOST_PATH}:${APP_CONTAINER_PATH}:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app_network

  php:
    build:
      context: .
      dockerfile: php/Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION}
    container_name: ${APP_NAME}_php
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      TZ: ${TZ}
      APP_NAME: ${APP_NAME}
      APP_CONTAINER_PATH: ${APP_CONTAINER_PATH}
      XDEBUG_MODE: ${XDEBUG_MODE}
      XDEBUG_CONFIG: client_host=${XDEBUG_CLIENT_HOST} client_port=${XDEBUG_CLIENT_PORT}
      PHP_IDE_CONFIG: serverName=${APP_NAME}
    volumes:
      - ${APP_HOST_PATH}:${APP_CONTAINER_PATH}
    working_dir: ${APP_CONTAINER_PATH}
    networks:
      - app_network

  node:
    build:
      context: .
      dockerfile: node/Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION}
    container_name: ${APP_NAME}_node
    environment:
      TZ: ${TZ}
    volumes:
      - ${APP_HOST_PATH}:${APP_CONTAINER_PATH}
    working_dir: ${APP_CONTAINER_PATH}
    command: sh -lc "tail -f /dev/null"
    networks:
      - app_network

  mysql:
    image: mysql:8.4
    container_name: ${APP_NAME}_mysql
    environment:
      TZ: ${TZ}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: ${APP_NAME}_redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - app_network

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: ${APP_NAME}_mailhog
    ports:
      - "${MAILHOG_SMTP_PORT}:1025"
      - "${MAILHOG_HTTP_PORT}:8025"
    networks:
      - app_network

networks:
  app_network:
    name: ${APP_NAME}_network
    driver: bridge

volumes:
  mysql_data:
    name: ${APP_NAME}_mysql_data
  redis_data:
    name: ${APP_NAME}_redis_data
